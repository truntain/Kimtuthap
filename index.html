<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kim tự tháp và Nhân sư bằng Bìa cứng</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    
    <script>
        // --- THIẾT LẬP CẢNH VÀ CAMERA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xFFFFFF); 
        scene.fog = new THREE.Fog(0xFFFFFF, 50, 400);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        // Lùi camera ra xa một chút và dịch sang trái để nhìn rõ toàn cảnh
        camera.position.set(0, 30, 50); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0; 
        document.body.appendChild(renderer.domElement);

        // --- KHỞI TẠO ORBITCONTROLS ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        // Tập trung camera vào vị trí giữa đội hình
        controls.target.set(-10, 5, 0); 

        // --- ÁNH SÁNG ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xfff5e1, 1.5);
        sun.position.set(50, 80, 20);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        scene.add(sun);

        // --- MẶT ĐẤT GỖ ---
        function createWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const context = canvas.getContext('2d');
            context.fillStyle = '#C2986F'; 
            context.fillRect(0, 0, 128, 128);
            context.strokeStyle = '#8B5A2B'; 
            context.lineWidth = 1;
            for (let i = 0; i < 20; i++) {
                context.beginPath();
                context.moveTo(Math.random() * 128, 0);
                context.bezierCurveTo(Math.random() * 128, 64, Math.random() * 128, 64, Math.random() * 128, 128);
                context.stroke();
            }
            return new THREE.CanvasTexture(canvas);
        }

        const woodTexture = createWoodTexture();
        woodTexture.wrapS = THREE.RepeatWrapping;
        woodTexture.wrapT = THREE.RepeatWrapping;
        woodTexture.repeat.set(100, 100);

        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(1000, 1000),
            new THREE.MeshStandardMaterial({ map: woodTexture, roughness: 1 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- HỌA TIẾT KIM TỰ THÁP ---
        function createBrickTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');
            context.fillStyle = '#FFB84D'; 
            context.fillRect(0, 0, 512, 512);
            context.strokeStyle = '#D96600'; 
            context.lineWidth = 2.5;
            
            for(let y = 0; y <= 512; y += 32) {
                context.beginPath();
                context.moveTo(0, y);
                context.lineTo(512, y);
                context.stroke();
            }
            for(let y = 0; y < 512; y += 32) {
                let offsetX = (y / 32) % 2 === 0 ? 0 : 32;
                for(let x = offsetX; x <= 512; x += 64) {
                    context.beginPath();
                    context.moveTo(x, y);
                    context.lineTo(x, y + 32);
                    context.stroke();
                }
            }
            return new THREE.CanvasTexture(canvas);
        }

        const brickTexture = createBrickTexture();
        brickTexture.wrapS = THREE.RepeatWrapping;
        brickTexture.wrapT = THREE.RepeatWrapping;
        brickTexture.repeat.set(2, 2);

        const pyramidMaterial = new THREE.MeshStandardMaterial({
            map: brickTexture, 
            roughness: 0.9,
            flatShading: true 
        });

        function createPyramid(x, z, scale) {
            const height = 8 * scale;
            const baseSide = (230.3 / 146.6) * height;
            const radius = baseSide / Math.sqrt(2);

            const geometry = new THREE.ConeGeometry(radius, height, 4);
            const mesh = new THREE.Mesh(geometry, pyramidMaterial);
            mesh.position.set(x, height / 2, z);
            mesh.rotation.y = Math.PI / 4; 
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }

        // Tạo 3 Kim tự tháp (To, Vừa, Nhỏ) xếp thành 1 hàng ngang trên trục Z = -4
        createPyramid(-16, -4, 1.5); // Kim tự tháp To bên trái
        createPyramid(2, -4, 1.0);   // Kim tự tháp Vừa ở giữa
        createPyramid(15, -4, 0.7);  // Kim tự tháp Nhỏ bên phải

        // --- NHÂN SƯ BẰNG BÌA CỨNG ---
        const sphinxGroup = new THREE.Group();
        const sphinxMaterial = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 1 });

        // Cơ thể
        const bodyGeo = new THREE.BoxGeometry(4, 2, 8);
        const body = new THREE.Mesh(bodyGeo, sphinxMaterial);
        body.position.set(0, 1, 0);
        body.castShadow = true;
        sphinxGroup.add(body);

        // Chân trước
        const legGeo = new THREE.BoxGeometry(1, 1, 3);
        const legL = new THREE.Mesh(legGeo, sphinxMaterial);
        legL.position.set(-1.2, 0.5, 4);
        legL.castShadow = true;
        sphinxGroup.add(legL);
        
        const legR = new THREE.Mesh(legGeo, sphinxMaterial);
        legR.position.set(1.2, 0.5, 4);
        legR.castShadow = true;
        sphinxGroup.add(legR);

        // Đầu và Mũ Nemes
        function createNemesTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const context = canvas.getContext('2d');
            context.fillStyle = '#FFFFFF';
            context.fillRect(0, 0, 256, 256);
            context.fillStyle = '#1A365D'; 
            for (let i = 0; i < 256; i += 32) {
                context.fillRect(i, 0, 16, 256);
            }
            return new THREE.CanvasTexture(canvas);
        }

        const nemesTexture = createNemesTexture();
        const nemesGeo = new THREE.CylinderGeometry(1.5, 1.5, 2.5, 32);
        const nemesMat = new THREE.MeshStandardMaterial({ map: nemesTexture });
        const headNemes = new THREE.Mesh(nemesGeo, nemesMat);
        headNemes.position.set(0, 3.25, 3);
        headNemes.rotation.x = Math.PI / 2; 
        headNemes.rotation.z = Math.PI / 2;
        headNemes.castShadow = true;
        sphinxGroup.add(headNemes);

        // Khối mặt
        const faceGeo = new THREE.CylinderGeometry(0.8, 0.8, 1.2, 32);
        const faceMesh = new THREE.Mesh(faceGeo, sphinxMaterial);
        faceMesh.position.set(0, 3.25, 4.2);
        faceMesh.rotation.x = Math.PI / 2;
        sphinxGroup.add(faceMesh);

        // Râu
        const beardGeo = new THREE.BoxGeometry(0.3, 1, 0.3);
        const beard = new THREE.Mesh(beardGeo, sphinxMaterial);
        beard.position.set(0, 2.2, 4.6);
        sphinxGroup.add(beard);

        scene.add(sphinxGroup);

        // --- SẮP XẾP LẠI VỊ TRÍ NHÂN SƯ ---
        // Đặt nhân sư ở bên trái cùng (X = -32), ngang hàng với kim tự tháp (Z = -4)
        sphinxGroup.position.set(-32, 0, -4); 
        
        // Góc xoay Y = 0 để mặt nhân sư hướng thẳng về phía camera (vuông góc với hàng kim tự tháp)
        sphinxGroup.rotation.y = 0; 

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();

        // --- ĐIỀU CHỈNH KHI THAY ĐỔI KÍCH THƯỚC CỬA SỔ ---
        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
